<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="licensePageBrowserTitle">Licenses - All Tabs Closure</title>
  <style>
    @font-face {
      font-family: 'MFB Oldstyle';
      src: url('../Fonts/MFB-Oldstyle-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #f5f3f0;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --card: #fffdfb;
      --border: rgba(0, 0, 0, 0.08);
      --theme-bg: rgba(0, 0, 0, 0.06);
      --theme-active: rgba(247, 111, 83, 0.2);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #19191b;
        --fg: #e8e6e3;
        --muted: #a6a29e;
        --card: #232325;
        --border: rgba(255, 255, 255, 0.08);
        --theme-bg: rgba(255, 255, 255, 0.08);
        --theme-active: rgba(247, 111, 83, 0.28);
      }
    }

    html[data-theme='light'] {
      --bg: #f5f3f0;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --card: #fffdfb;
      --border: rgba(0, 0, 0, 0.08);
      --theme-bg: rgba(0, 0, 0, 0.06);
      --theme-active: rgba(247, 111, 83, 0.2);
    }

    html[data-theme='dark'] {
      --bg: #19191b;
      --fg: #e8e6e3;
      --muted: #a6a29e;
      --card: #232325;
      --border: rgba(255, 255, 255, 0.08);
      --theme-bg: rgba(255, 255, 255, 0.08);
      --theme-active: rgba(247, 111, 83, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "MFB Oldstyle", "Rubik", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      padding: 22px 14px;
    }

    .wrap {
      width: min(980px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    h1 {
      font-size: 28px;
      letter-spacing: -0.3px;
    }

    p {
      color: var(--muted);
      margin-top: 4px;
      font-size: 14px;
    }

    .theme-switch {
      display: inline-flex;
      gap: 4px;
      padding: 3px;
      border-radius: 999px;
      background: var(--theme-bg);
    }

    .theme-switch button {
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .theme-switch button.active {
      background: var(--theme-active);
    }

    .theme-switch img {
      width: 16px;
      height: 16px;
      opacity: 0.85;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    pre {
      white-space: pre-wrap;
      line-height: 1.5;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      color: var(--fg);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1 data-i18n="licensePageTitle"></h1>
        <p data-i18n="licensePageSubtitle"></p>
      </div>
      <div class="theme-switch" role="group" data-i18n-aria-label="themeSwitcherAriaLabel">
        <button id="themeLight" type="button" data-i18n-aria-label="themeLightAriaLabel">
          <img src="../Third-party-icons/sun.svg" alt="">
        </button>
        <button id="themeDark" type="button" data-i18n-aria-label="themeDarkAriaLabel">
          <img src="../Third-party-icons/moon.svg" alt="">
        </button>
      </div>
    </div>

    <section class="card">
      <h2 data-i18n="licenseProjectHeading"></h2>
      <pre id="projectLicense" data-i18n="licenseLoading"></pre>
    </section>

    <section class="card">
      <h2 data-i18n="licenseThirdPartyHeading"></h2>
      <pre id="thirdPartyLicenses" data-i18n="licenseLoading"></pre>
    </section>
  </main>
  <script src="license.js"></script>
</body>
</html>
