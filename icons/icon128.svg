<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8a65"/>
      <stop offset="100%" stop-color="#f76f53"/>
    </linearGradient>

    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <filter id="xglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="bg-clip">
      <rect x="4" y="4" width="120" height="120" rx="26"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#bg-grad)"/>

  <!-- Gloss overlay -->
  <rect x="4" y="4" width="120" height="60" rx="26" fill="url(#gloss)" clip-path="url(#bg-clip)"/>

  <!-- Browser Window -->
  <g filter="url(#shadow)">
    <rect x="16" y="26" width="96" height="76" rx="9" fill="rgba(255,255,255,0.14)"/>
    <rect x="16" y="26" width="96" height="22" rx="9" fill="rgba(255,255,255,0.20)"/>
    <rect x="16" y="38" width="96" height="10" fill="rgba(255,255,255,0.20)"/>
    <rect x="16" y="26" width="96" height="76" rx="9"
          fill="none" stroke="rgba(255,255,255,0.50)" stroke-width="1.5"/>

    <!-- Traffic-light dots -->
    <circle cx="28" cy="37" r="3.5" fill="rgba(255,255,255,0.80)"/>
    <circle cx="39" cy="37" r="3.5" fill="rgba(255,255,255,0.55)"/>
    <circle cx="50" cy="37" r="3.5" fill="rgba(255,255,255,0.30)"/>

    <!-- Address bar -->
    <rect x="60" y="31" width="44" height="12" rx="6"
          fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.30)" stroke-width="1"/>

    <line x1="16" y1="48" x2="112" y2="48" stroke="rgba(255,255,255,0.30)" stroke-width="1"/>

    <!-- Tabs -->
    <rect x="20" y="49" width="26" height="9" rx="4.5" fill="white" opacity="0.90"/>
    <rect x="50" y="49" width="22" height="9" rx="4.5" fill="white" opacity="0.50"/>
    <rect x="76" y="49" width="16" height="9" rx="4.5" fill="white" opacity="0.25"/>
  </g>

  <!-- X Mark -->
  <g filter="url(#xglow)">
    <circle cx="64" cy="77" r="19" fill="rgba(255,255,255,0.12)"/>
    <line x1="52" y1="65" x2="76" y2="89" stroke="white" stroke-width="6.5" stroke-linecap="round"/>
    <line x1="76" y1="65" x2="52" y2="89" stroke="white" stroke-width="6.5" stroke-linecap="round"/>
  </g>
</svg>